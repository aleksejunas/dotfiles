# .tmuxinator/itea.yml
name: itea-shop-ssh
root: ~/Kode/Projects/ITea/itea-shop-ssh/

windows:
  - "CODE":
      layout: main-horizontal 70/30
      panes:
        - nvim
        - claude --resume
  - "SERVER":
      panes: zsh
  - "SHOP":
      panes: zsh
  - "COMMAND":
      panes:
        - clear
