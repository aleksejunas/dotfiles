#-- General ----------------------------------------------------
general {
	disable_loading_bar = true
	hide_cursor = true
	grace = 2
	no_fade_in = false
	no_fade_out = false
	ignore_empty_input = false
}

#-- Background -------------------------------------------------
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0115
    contrast = 0.9
    brightness = 0.75
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

#-- Circle input field -----------------------------------------
input-field {
    monitor =
    size = 360, 360
    rounding = -1
    outline_thickness = 32

    dots_size = 0.2
    dots_spacing = 0.25
    dots_center = true
    dots_rounding = -1

    outer_color = rgb(156, 207, 216)     # foam (cyan) — normal
    inner_color = rgba(31, 29, 46, 0.85) # rose-pine overlay, semi-transparent

    font_color = rgb(224, 222, 244)
    font_size = 13
    font_family = Iosevka

    placeholder_text = <span foreground='##9ccfd8'></span>
    hide_input = false

    fade_on_empty = false

    check_color = rgb(196, 167, 231)     # iris (purple) — verifying
    fail_color = rgb(235, 111, 146)      # love (pink/red) — feil passord
    capslock_color = rgb(246, 193, 119)  # gold — caps lock

    fail_text = <b>$FAIL</b>
    fail_transition = 300

    position = 0, 0
    halign = center
    valign = center

    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgb(0, 0, 0)
    shadow_boost = 0.5
}

#-- Attempts / status label ------------------------------------
label {
    monitor =
    text = $FAIL
    color = rgb(235, 111, 146)
    font_size = 16
    font_family = Iosevka Bold

    position = 0, -215
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgb(0, 0, 0)
    shadow_boost = 0.5
}

#-- Time -------------------------------------------------------
label {
    monitor =
    text = $TIME
    color = rgb(224, 222, 244)
    font_size = 72
    font_family = Iosevka Bold

    position = 0, 330
    halign = center
    valign = center

    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgb(0, 0, 0)
    shadow_boost = 1.0
}

#-- Date -------------------------------------------------------
label {
    monitor =
    text = cmd[update:60000] date +"%A, %e. %B"
    color = rgb(144, 140, 170)
    font_size = 22
    font_family = Iosevka

    position = 0, 245
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgb(0, 0, 0)
    shadow_boost = 0.5
}

#-- User -------------------------------------------------------
label {
    monitor =
    text = <span foreground='##9ccfd8'>$USER</span>
    color = rgb(224, 222, 244)
    font_size = 18
    font_family = Iosevka

    position = 0, -270
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgb(0, 0, 0)
    shadow_boost = 0.5
}
